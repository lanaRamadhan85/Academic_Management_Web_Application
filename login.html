<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Akademik Mini</title>
    <meta name="description" content="Sistem Akademik Mini - Login Admin untuk manajemen data mahasiswa">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body class="login-body">

    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Login Card -->
    <div class="login-container" id="loginContainer">
        <div class="login-logo">
            <iconify-icon icon="lucide:graduation-cap" width="36" height="36"></iconify-icon>
        </div>

        <h1 class="login-title">Sistem Akademik</h1>
        <p class="login-subtitle">Silakan login sebagai Admin</p>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <iconify-icon icon="lucide:user" class="input-icon" width="18" height="18"></iconify-icon>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <iconify-icon icon="lucide:lock" class="input-icon" width="18" height="18"></iconify-icon>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
            </div>

            <p id="loginError" class="error-msg hidden">
                <iconify-icon icon="lucide:x-circle" width="16" height="16"></iconify-icon>
                Username atau Password salah!
            </p>

            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span>Login</span>
                <iconify-icon icon="lucide:arrow-right" width="18" height="18"></iconify-icon>
            </button>
        </form>

        <div class="login-hint">
            <span>Demo:</span> admin / admin123
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
